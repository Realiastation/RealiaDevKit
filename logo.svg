<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
<defs>
<!-- Effet néon glow -->
<filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="4" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
<filter id="strong-neon" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="6" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
<!-- Gradient ampoule -->
<radialGradient id="bulb" cx="50%" cy="40%" r="50%">
<stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1"/>
<stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.8"/>
</radialGradient>
</defs>
<!-- Fond noir étoilé -->
<rect width="400" height="400" fill="#0a0a0a"/>
<!-- Étoiles -->
<circle cx="50" cy="80" r="1" fill="#fff" opacity="0.6"/>
<circle cx="120" cy="40" r="1.5" fill="#fff" opacity="0.8"/>
<circle cx="280" cy="60" r="1" fill="#fff" opacity="0.5"/>
<circle cx="350" cy="100" r="1.5" fill="#fff" opacity="0.7"/>
<circle cx="80" cy="320" r="1" fill="#fff" opacity="0.6"/>
<circle cx="320" cy="340" r="1.5" fill="#fff" opacity="0.8"/>
<circle cx="30" cy="200" r="1" fill="#fff" opacity="0.5"/>
<circle cx="370" cy="220" r="1" fill="#fff" opacity="0.7"/>
<!-- Maison néon violet -->
<path d="M 200 60 L 340 140 L 340 320 L 60 320 L 60 140 Z" fill="none" stroke="#a855f7" stroke-width="6" filter="url(#neon)"/>
<!-- Toit -->
<path d="M 200 60 L 340 140 L 60 140 Z" fill="none" stroke="#a855f7" stroke-width="6" filter="url(#neon)"/>
<!-- Circuits dans la maison -->
<path d="M 80 160 L 120 160 L 120 180 L 150 180" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
<path d="M 320 160 L 280 160 L 280 180 L 250 180" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
<path d="M 100 280 L 130 280 L 130 260 L 160 260" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
<path d="M 300 280 L 270 280 L 270 260 L 240 260" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
<!-- Ampoule centrale -->
<g filter="url(#strong-neon)">
<ellipse cx="200" cy="200" rx="50" ry="60" fill="url(#bulb)" stroke="#fbbf24" stroke-width="4"/>
<path d="M 175 260 L 175 290 L 225 290 L 225 260" fill="none" stroke="#f59e0b" stroke-width="4"/>
<line x1="185" y1="260" x2="185" y2="290" stroke="#f59e0b" stroke-width="3"/>
<line x1="200" y1="260" x2="200" y2="290" stroke="#f59e0b" stroke-width="3"/>
<line x1="215" y1="260" x2="215" y2="290" stroke="#f59e0b" stroke-width="3"/>
</g>
<!-- Œil G4 (cyan) -->
<g transform="translate(100, 340)">
<ellipse cx="0" cy="0" rx="30" ry="18" fill="none" stroke="#06b6d4" stroke-width="3" filter="url(#neon)"/>
<circle cx="0" cy="0" r="10" fill="#06b6d4" opacity="0.9"/>
<circle cx="0" cy="0" r="4" fill="#000"/>
<text x="0" y="40" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="16" font-weight="bold" filter="url(#neon)">G4</text>
</g>
<!-- Clé à molette Q3N (vert) -->
<g transform="translate(200, 360)">
<path d="M -40 -15 L 40 -15 L 50 -5 L 50 5 L 40 15 L -40 15 L -50 5 L -50 -5 Z" fill="none" stroke="#10b981" stroke-width="3" filter="url(#neon)"/>
<rect x="-12" y="-25" width="24" height="12" fill="#10b981" opacity="0.9"/>
<text x="0" y="40" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="16" font-weight="bold" filter="url(#neon)">Q3N</text>
</g>
<!-- Q3.6 (violet) -->
<g transform="translate(320, 100)">
<text x="0" y="0" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="20" font-weight="bold" filter="url(#neon)">Q3.6</text>
</g>
<!-- Texte RealiaDevKit -->
<text x="200" y="380" text-anchor="middle" fill="#e879f9" font-family="monospace" font-size="18" font-weight="bold" letter-spacing="3" filter="url(#neon)">REALIADEVKIT</text>
</svg>
